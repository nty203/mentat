<div class="flex flex-col h-full">

  <!-- header -->
  <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center gap-3">
    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    <span class="font-semibold text-sm">설정</span>
  </div>

  <!-- body -->
  <div class="flex-1 overflow-y-auto px-6 py-6 space-y-6">

    <!-- AI Backend (read-only) -->
    <div>
      <label class="block text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium mb-2">AI 백엔드</label>
      <div class="text-sm text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-800 rounded px-3 py-2 font-mono">
        {{ backend }}
      </div>
    </div>

    <!-- Model selector -->
    <form hx-post="/api/settings" hx-target="#right-panel" hx-swap="innerHTML">
      <label class="block text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium mb-2">Claude 모델</label>
      <div class="space-y-2 mb-4">

        <label class="flex items-center gap-3 p-3 rounded border cursor-pointer
          {% if current_model == 'haiku' %}border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20{% else %}border-gray-200 dark:border-gray-700 hover:border-emerald-400{% endif %}">
          <input type="radio" name="model" value="haiku" {% if current_model == 'haiku' %}checked{% endif %}
            class="accent-emerald-600"/>
          <div>
            <div class="text-sm font-medium">Haiku</div>
            <div class="text-xs text-gray-400">claude-haiku-4-5 — 빠름, 저렴</div>
          </div>
        </label>

        <label class="flex items-center gap-3 p-3 rounded border cursor-pointer
          {% if current_model == 'sonnet' or current_model == '' %}border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20{% else %}border-gray-200 dark:border-gray-700 hover:border-emerald-400{% endif %}">
          <input type="radio" name="model" value="sonnet" {% if current_model == 'sonnet' or current_model == '' %}checked{% endif %}
            class="accent-emerald-600"/>
          <div>
            <div class="text-sm font-medium">Sonnet <span class="text-xs text-emerald-600 font-semibold">기본값</span></div>
            <div class="text-xs text-gray-400">claude-sonnet-4-6 — 균형</div>
          </div>
        </label>

        <label class="flex items-center gap-3 p-3 rounded border cursor-pointer
          {% if current_model == 'opus' %}border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20{% else %}border-gray-200 dark:border-gray-700 hover:border-emerald-400{% endif %}">
          <input type="radio" name="model" value="opus" {% if current_model == 'opus' %}checked{% endif %}
            class="accent-emerald-600"/>
          <div>
            <div class="text-sm font-medium">Opus</div>
            <div class="text-xs text-gray-400">claude-opus-4-7 — 최고 성능, 느림</div>
          </div>
        </label>

      </div>

      <button type="submit"
        class="px-4 py-2 text-sm rounded bg-emerald-600 hover:bg-emerald-500 text-white transition-colors">
        저장
      </button>

      {% if saved %}
      <span class="ml-3 text-sm text-emerald-600">✓ 저장되었습니다.</span>
      {% endif %}
    </form>

  </div>
</div>
