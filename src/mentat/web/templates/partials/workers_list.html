{% if workers %}
  {% for w in workers %}
  <div class="px-4 py-2 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer group"
       hx-get="/api/workers/{{ w.name }}"
       hx-target="#right-panel"
       hx-swap="innerHTML">
    <div class="min-w-0 flex-1">
      <div class="text-sm font-medium capitalize">{{ w.name }}</div>
      <div class="text-xs text-gray-400 truncate">{{ w.description or '워커 템플릿' }}</div>
    </div>
    <svg class="w-4 h-4 text-gray-300 group-hover:text-gray-500 flex-shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
  </div>
  {% endfor %}
{% else %}
  <div class="px-4 py-10 text-center">
    <div class="text-3xl mb-3">🔧</div>
    <div class="text-sm font-medium text-gray-600 dark:text-gray-300 mb-1">워커 템플릿 없음</div>
    <div class="text-xs text-gray-400 dark:text-gray-500">
      <code class="font-mono">workers/templates/</code>에<br>.md 파일을 추가하세요.
    </div>
  </div>
{% endif %}
