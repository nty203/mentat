{% if pending %}
  <ul class="divide-y divide-gray-100 dark:divide-gray-800">
    {% for req in pending %}
    <li id="approval-{{ req.id }}" class="px-4 py-3">
      <div class="text-sm font-medium mb-0.5">{{ req.data.get('name', req.id[:8]) }}</div>
      <div class="font-mono text-xs text-gray-400 truncate mb-2">{{ req.data.get('path', '') }}</div>
      <div class="flex gap-2">
        <button
          class="px-3 py-1 text-xs rounded bg-emerald-600 hover:bg-emerald-500 text-white transition-colors"
          hx-post="/api/approvals/{{ req.id }}/approve"
          hx-target="#approval-{{ req.id }}"
          hx-swap="delete swap:150ms"
          hx-on::after-request="if(event.detail.failed){this.closest('li').style.opacity='1';alert('승인 실패 — 다시 시도하세요')}">
          approve
        </button>
        <button
          class="px-3 py-1 text-xs rounded border border-red-400 text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors"
          hx-post="/api/approvals/{{ req.id }}/reject"
          hx-target="#approval-{{ req.id }}"
          hx-swap="delete swap:150ms"
          hx-on::after-request="if(event.detail.failed){this.closest('li').style.opacity='1';alert('거절 실패 — 다시 시도하세요')}">
          reject
        </button>
      </div>
    </li>
    {% endfor %}
  </ul>
{% else %}
  <div class="px-4 py-6 text-sm text-gray-400 dark:text-gray-500 text-center">
    대기 중인 승인이 없습니다.<br>
    <code class="font-mono text-xs">mentat bootstrap</code>을 실행하세요.
  </div>
{% endif %}
