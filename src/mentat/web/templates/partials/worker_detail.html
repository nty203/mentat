{% if worker %}
<div class="flex flex-col h-full">
  <div class="border-b border-gray-200 dark:border-gray-700 px-4 py-3 flex items-center gap-3">
    <button hx-get="/api/chat/panel" hx-target="#right-panel" hx-swap="innerHTML"
      class="text-sm text-emerald-600 hover:text-emerald-500 flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      돌아가기
    </button>
    <span class="text-xs bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 px-2 py-0.5 rounded">워커 템플릿</span>
  </div>
  <div class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
    <h2 class="text-lg font-semibold capitalize">{{ worker.name }}</h2>
    {% if worker.description %}
    <p class="text-sm text-gray-600 dark:text-gray-400">{{ worker.description }}</p>
    {% endif %}
    <div>
      <div class="text-xs uppercase tracking-wider text-gray-500 mb-2">프롬프트</div>
      <pre class="text-xs font-mono bg-gray-50 dark:bg-gray-800 rounded p-3 overflow-x-auto whitespace-pre-wrap">{{ worker.body }}</pre>
    </div>
  </div>
</div>
{% else %}
<div class="flex items-center justify-center h-full text-gray-400 text-sm">템플릿을 찾을 수 없습니다.</div>
{% endif %}
