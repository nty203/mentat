{% if available %}
<span class="flex items-center gap-1 text-xs text-emerald-600 dark:text-emerald-400" title="{{ backend }}">
  <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
  Claude 연결됨
</span>
{% else %}
<button onclick="loadSettings()" title="클릭하여 설정"
  class="flex items-center gap-1 text-xs text-red-500 hover:text-red-400 transition-colors">
  <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
  연결 안됨
</button>
{% endif %}
